global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alert rules
rule_files:
  - "alert.rules.yml"

scrape_configs:

  # ─── Prometheus tự scrape chính nó ───
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # ─── Host machine metrics ───
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # ─── MongoDB metrics ───
  - job_name: mongodb-exporter
    static_configs:
      - targets: ["mongodb-exporter:9216"]

  # ─── Container metrics (NEW) ───
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # ─── HTTP probe: backend /health (NEW) ───
  - job_name: blackbox-backend
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://backend:8000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # ─── HTTP probe: frontend (NEW) ───
  - job_name: blackbox-frontend
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://frontend:80
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115