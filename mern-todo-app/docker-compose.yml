version: "3.8"

services:

  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                          # ← đọc từ .env, không hardcode
    environment:
      - MONGO_URI=mongodb://mongo:27017/todo   # override để dùng service name
    depends_on:
      mongo:
        condition: service_healthy    # Chờ MongoDB THỰC SỰ ready
    networks:
      - todo-network

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"                     # ← nginx serve ở port 80 bên trong
    depends_on:
      - backend
    networks:
      - todo-network

volumes:
  mongo_data:
    driver: local

networks:
  todo-network:
    driver: bridge