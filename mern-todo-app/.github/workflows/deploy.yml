name: CI/CD Pipeline

on:
  push:
    branches: [ main ]        # Trigger khi push lên main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  # ──────────────────────────────────────────────────────
  # Job 1: Build và push Docker images lên Docker Hub
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short commit SHA)
        id: set_tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:${{ steps.set_tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:${{ steps.set_tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # Job 2: Deploy lên VPS
  # (chỉ chạy khi Job 1 thành công)
  # ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH vào VPS và deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/DevOps2_CapStonePrj/mern-todo-app

            # Cập nhật IMAGE_TAG trong .env.prod
            sed -i "s/IMAGE_TAG=.*/IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}/" .env.prod

            # Pull images mới từ Docker Hub
            export $(cat .env.prod | xargs)
            docker compose -f docker-compose.prod.yml pull

            # Restart với images mới
            docker compose -f docker-compose.prod.yml up -d

            # Dọn dẹp images cũ
            docker image prune -f

            # Kiểm tra kết quả
            docker compose -f docker-compose.prod.yml ps


            