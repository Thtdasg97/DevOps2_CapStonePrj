version: "3.8"

services:

  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: ${DOCKERHUB_USERNAME}/todo-backend:${IMAGE_TAG:-latest}   # ← pull từ Docker - Hub
    container_name: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/todo
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - todo-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/todo-frontend:${IMAGE_TAG:-latest}  # ← pull từ Docker Hub
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - todo-network

volumes:
  mongo_data:
    driver: local

networks:
  todo-network:
    driver: bridge